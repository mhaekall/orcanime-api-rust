name: Background Ingestion Worker

on:
  schedule:
    - cron: '0 */12 * * *'  # Setiap 12 jam
  workflow_dispatch:

jobs:
  ingest-pending:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
        
      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt
        
      - name: Run Ingestion for Pending Episodes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_PROXY_BASE_URL: ${{ secrets.TG_PROXY_BASE_URL }}
        run: |
          echo "Worker ingestion dijalankan via GitHub Actions!"
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/apps/api
          python apps/api/scripts/ingest_pending.py --limit 10
